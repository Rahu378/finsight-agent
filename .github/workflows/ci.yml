name: FinSight CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=75

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finsight-agent:${{ github.sha }} .

      - name: Validate container starts
        run: |
          docker run -d --name finsight-test \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -p 8001:8000 \
            finsight-agent:${{ github.sha }}
          sleep 5
          # Just verify image builds — actual health check needs real AWS creds
          docker logs finsight-test
          docker rm -f finsight-test
